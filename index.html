<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Birthday Surprise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Coiny&family=Titan+One&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Nerko+One&family=Sriracha&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --color-pink: #e0f7fa;
            --color-white: #fff;
            --color-black: #333;
            --color-text-pink: #0091ea;
            --color-heart: #00b0ff;
            --color-bg-letter: #f1faff;
            --color-border: #b3e5fc;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: var(--color-pink);
        }

        #wrapper {
            position: relative;
            background-image: linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.5) 25%, rgba(255, 255, 255, 0.5) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.5) 75%, rgba(255, 255, 255, 0.5) 76%, transparent 77%, transparent), 
                              linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.5) 25%, rgba(255, 255, 255, 0.5) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.5) 75%, rgba(255, 255, 255, 0.5) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Responsive Flags */
        .flag__birthday {
            display: flex;
            justify-content: space-between;
            transform: translateY(-200px);
            animation: translateYFlag 1.5s 1s forwards;
            padding: 0 5%;
        }

        @keyframes translateYFlag {
            to { transform: translateY(0); }
        }

        .flag__birthday img {
            width: clamp(80px, 15vw, 150px);
            height: auto;
        }

        /* Main Content Layout */
        .content {
            display: flex;
            flex-direction: row; /* Default side-by-side */
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .content .left { width: 45%; text-align: center; }
        .content .right { width: 55%; position: relative; display: flex; flex-direction: column; align-items: center; }

        /* Typography */
        .title {
            font-family: "Titan One", sans-serif;
            font-size: clamp(2rem, 6vw, 4rem);
            line-height: 1.1;
        }

        .title .happy { color: var(--color-white); text-shadow: 3px 3px var(--color-black); }
        .title .birthday { color: var(--color-text-pink); text-shadow: 3px 3px var(--color-black); }

        /* Responsive Image Circle */
        .content .right .image {
            width: clamp(200px, 35vw, 400px);
            height: clamp(200px, 35vw, 400px);
            border-radius: 50%;
            border: 6px solid var(--color-black);
            overflow: hidden;
            background: #ccc;
        }

        .content .right .image img { width: 100%; height: 100%; object-fit: cover; }

        /* Name Tag - Adjusted to sit nicely below image */
        .name {
            background-color: var(--color-text-pink);
            border: 3px solid var(--color-black);
            color: #fff;
            padding: 8px 25px;
            border-radius: 50px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 3vw, 2rem);
            margin-top: -20px; /* Slight overlap */
            z-index: 2;
        }

        /* Buttons and Interactive Elements */
        #btn__letter {
            margin-top: 30px;
            background-color: var(--color-text-pink);
            color: #fff;
            padding: 10px 30px;
            border: 3px solid var(--color-black);
            border-radius: 50px;
            font-family: 'Sriracha', cursive;
            cursor: pointer;
            transition: transform 0.3s;
        }

        #btn__letter:active { transform: scale(0.9); }

        /* --- MOBILE ADJUSTMENTS --- */
        @media screen and (max-width: 768px) {
            .content {
                flex-direction: column; /* Stacks image on top of text */
            }
            .content .left, .content .right {
                width: 100%;
            }
            .content .right {
                order: 1; /* Puts image first */
            }
            .content .left {
                order: 2; /* Puts text second */
            }
            
            /* Smaller hat and decorations for mobile */
            .title .hat {
                width: 50px;
                top: -30px;
                right: 20px;
            }
        }

        /* Decoration stars/flowers (Simplified for responsiveness) */
        .decorate_star {
            display: none; /* Hidden by default on small screens to avoid clutter */
        }
        @media screen and (min-width: 1024px) {
            .decorate_star { display: block; position: absolute; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div class="flag__birthday">
        <img src="https://via.placeholder.com/150x100?text=Flag+Left" class="flag__left" alt="flag">
        <img src="https://via.placeholder.com/150x100?text=Flag+Right" class="flag__right" alt="flag">
    </div>

    <div class="content">
        <div class="left">
            <div class="title">
                <div class="happy">HAPPY</div>
                <div class="birthday">BIRTHDAY</div>
            </div>
            
            <div class="date__of__birth">
                <span>12 / 05 / 2000</span>
            </div>

            <button id="btn__letter">Open Letter 💌</button>
        </div>

        <div class="right">
            <div class="image">
                <img src="https://via.placeholder.com/400" alt="Birthday Person">
            </div>
            <div class="name">
                <span>Alex Doe</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Quick script to handle the letter click (placeholder logic)
    document.getElementById('btn__letter').addEventListener('click', function() {
        alert("The letter modal would open here! The CSS is now ready for all devices.");
    });
</script>

</body>
</html>
